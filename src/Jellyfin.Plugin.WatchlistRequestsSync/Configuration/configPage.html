<div id="WatchlistRequestsSyncConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
    <div is="emby-scroller" class="scrollY">
        <div class="content-primary">
            <h1>Watchlist Requests Sync</h1>
            <form id="watchlistRequestsSyncForm">
                <section class="settingsSection">
                    <h2>Global Settings</h2>

                    <label class="checkboxRow" for="enablePlugin">
                        <input id="enablePlugin" is="emby-checkbox" type="checkbox" />
                        <span>Enable Plugin</span>
                    </label>

                    <div class="fieldGroup">
                        <label for="baseUrl">Seerr/Jellyseerr Base URL</label>
                        <input id="baseUrl" is="emby-input" />
                    </div>

                    <div class="fieldGroup">
                        <label for="apiKey">API Key</label>
                        <input id="apiKey" is="emby-input" type="password" />
                    </div>

                    <div class="fieldGroup">
                        <label for="syncIntervalMinutes">Sync Interval (minutes)</label>
                        <input id="syncIntervalMinutes" is="emby-input" type="number" min="15" />
                    </div>

                    <label class="checkboxRow" for="dryRun">
                        <input id="dryRun" is="emby-checkbox" type="checkbox" />
                        <span>Dry Run</span>
                    </label>
                </section>

                <div class="buttonRow">
                    <button is="emby-button" type="button" id="testConnectionButton" class="raised button-submit block">Test Connection</button>
                    <button is="emby-button" type="button" id="previewSyncButton" class="raised button-submit block">Preview Sync</button>
                    <button is="emby-button" type="button" id="runSyncButton" class="raised button-submit block">Run Sync Now</button>
                </div>

                <section class="settingsSection">
                    <h2>Per-User Settings</h2>
                    <div id="userSettingsContainer"></div>
                </section>

                <section class="settingsSection">
                    <h2>Last Status</h2>
                    <pre id="statusOutput" class="statusOutput"></pre>
                </section>

                <button is="emby-button" type="submit" class="raised button-submit block">Save</button>
            </form>
        </div>
    </div>

    <style>
        #WatchlistRequestsSyncConfigPage .content-primary {
            max-width: 880px;
            margin: 0 auto;
            padding-bottom: 3rem;
        }

        #WatchlistRequestsSyncConfigPage #watchlistRequestsSyncForm {
            display: grid;
            gap: 1.5rem;
        }

        #WatchlistRequestsSyncConfigPage .settingsSection {
            display: grid;
            gap: 1rem;
            padding: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        #WatchlistRequestsSyncConfigPage .settingsSection h2 {
            margin: 0;
        }

        #WatchlistRequestsSyncConfigPage .fieldGroup {
            display: grid;
            gap: 0.4rem;
        }

        #WatchlistRequestsSyncConfigPage .fieldGroup label {
            font-weight: 600;
        }

        #WatchlistRequestsSyncConfigPage .fieldGroup input {
            width: 100%;
            box-sizing: border-box;
        }

        #WatchlistRequestsSyncConfigPage .checkboxRow {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
        }

        #WatchlistRequestsSyncConfigPage .buttonRow {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        #WatchlistRequestsSyncConfigPage .buttonRow button {
            min-width: 10rem;
        }

        #WatchlistRequestsSyncConfigPage .userCard {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 1rem 1rem 1.25rem;
            display: grid;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.15);
        }

        #WatchlistRequestsSyncConfigPage .userCard h3 {
            margin: 0;
        }

        #WatchlistRequestsSyncConfigPage .userCard label {
            display: grid;
            gap: 0.35rem;
        }

        #WatchlistRequestsSyncConfigPage .userCard input[type="text"] {
            width: 100%;
            box-sizing: border-box;
        }

        #WatchlistRequestsSyncConfigPage .userCard input[type="checkbox"] {
            justify-self: start;
        }

        #WatchlistRequestsSyncConfigPage .statusOutput {
            min-height: 12rem;
            background: rgba(0, 0, 0, 0.25);
            padding: 1rem;
            border-radius: 12px;
            overflow: auto;
            white-space: pre-wrap;
            margin: 0;
        }
    </style>

    <script type="text/javascript">
        (function () {
            "use strict";

            const pluginId = "7b2cef2e-d5ea-43e2-be8e-ab2070b2d18e";
            const page = document.querySelector("#WatchlistRequestsSyncConfigPage");
            const form = document.querySelector("#watchlistRequestsSyncForm");

            if (!page || !form) {
                return;
            }

            function byId(id) {
                return page.querySelector("#" + id);
            }

            function renderUsers(users) {
                const container = byId("userSettingsContainer");
                container.innerHTML = "";

                users.forEach(function (user, index) {
                    const wrapper = document.createElement("div");
                    wrapper.className = "userCard";
                    wrapper.innerHTML = [
                        "<h3>" + user.jellyfinUserName + "</h3>",
                        "<label>Enable Sync <input type='checkbox' data-field='isEnabled' " + (user.settings.isEnabled ? "checked" : "") + " /></label>",
                        "<label>Seerr User ID <input type='text' data-field='seerrUserId' value='" + (user.settings.seerrUserId || "") + "' /></label>",
                        "<label>Optional Media Tag <input type='text' data-field='mediaTag' value='" + (user.settings.mediaTag || "") + "' /></label>",
                        "<label>Include Movies <input type='checkbox' data-field='includeMovies' " + (user.settings.includeMovies ? "checked" : "") + " /></label>",
                        "<label>Include Series <input type='checkbox' data-field='includeSeries' " + (user.settings.includeSeries ? "checked" : "") + " /></label>",
                        "<label>Include Pending <input type='checkbox' data-field='includePendingRequests' " + (user.settings.includePendingRequests ? "checked" : "") + " /></label>",
                        "<label>Include Approved <input type='checkbox' data-field='includeApprovedRequests' " + (user.settings.includeApprovedRequests ? "checked" : "") + " /></label>",
                        "<label>Include Available <input type='checkbox' data-field='includeAvailableRequests' " + (user.settings.includeAvailableRequests ? "checked" : "") + " /></label>"
                    ].join("");
                    wrapper.dataset.index = index.toString();
                    container.appendChild(wrapper);
                });
            }

            async function fetchUsers() {
                const users = await ApiClient.getJSON(ApiClient.getUrl("Plugins/WatchlistRequestsSync/Users"));
                renderUsers(users);
                return users;
            }

            async function showStatus() {
                const status = await ApiClient.getJSON(ApiClient.getUrl("Plugins/WatchlistRequestsSync/Status"));
                byId("statusOutput").textContent = JSON.stringify(status, null, 2);
            }

            function captureUsers(existingUsers) {
                const cards = Array.from(page.querySelectorAll("#userSettingsContainer .userCard"));
                return cards.map(function (card) {
                    const index = parseInt(card.dataset.index, 10);
                    const original = existingUsers[index];
                    const updated = JSON.parse(JSON.stringify(original.settings));

                    card.querySelectorAll("[data-field]").forEach(function (field) {
                        if (field.type === "checkbox") {
                            updated[field.dataset.field] = field.checked;
                        } else {
                            updated[field.dataset.field] = field.value;
                        }
                    });

                    updated.jellyfinUserId = original.jellyfinUserId;
                    updated.jellyfinUserName = original.jellyfinUserName;
                    return updated;
                });
            }

            async function buildCurrentConfig() {
                const config = await ApiClient.getPluginConfiguration(pluginId);
                config.isEnabled = byId("enablePlugin").checked;
                config.seerrBaseUrl = (byId("baseUrl").value || "").trim();
                config.apiKey = byId("apiKey").value;
                config.syncIntervalMinutes = parseInt(byId("syncIntervalMinutes").value || "360", 10);
                config.dryRun = byId("dryRun").checked;
                config.users = captureUsers(page._users || []);
                return config;
            }

            async function persistCurrentConfig() {
                const config = await buildCurrentConfig();
                await ApiClient.updatePluginConfiguration(pluginId, config);
                return config;
            }

            async function loadPage() {
                const config = await ApiClient.getPluginConfiguration(pluginId);
                byId("enablePlugin").checked = !!config.isEnabled;
                byId("baseUrl").value = config.seerrBaseUrl || "";
                byId("apiKey").value = config.apiKey || "";
                byId("syncIntervalMinutes").value = config.syncIntervalMinutes || 360;
                byId("dryRun").checked = !!config.dryRun;
                page._users = await fetchUsers();
                await showStatus();
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();
                await persistCurrentConfig();
                Dashboard.processPluginConfigurationUpdateResult();
            });

            byId("testConnectionButton").addEventListener("click", async function () {
                await persistCurrentConfig();
                const result = await ApiClient.ajax({
                    type: "POST",
                    url: ApiClient.getUrl("Plugins/WatchlistRequestsSync/TestConnection"),
                    dataType: "json"
                });
                byId("statusOutput").textContent = JSON.stringify(result, null, 2);
            });

            byId("previewSyncButton").addEventListener("click", async function () {
                await persistCurrentConfig();
                const result = await ApiClient.ajax({
                    type: "POST",
                    url: ApiClient.getUrl("Plugins/WatchlistRequestsSync/PreviewSync"),
                    dataType: "json"
                });
                byId("statusOutput").textContent = JSON.stringify(result, null, 2);
            });

            byId("runSyncButton").addEventListener("click", async function () {
                await persistCurrentConfig();
                const result = await ApiClient.ajax({
                    type: "POST",
                    url: ApiClient.getUrl("Plugins/WatchlistRequestsSync/RunSync"),
                    dataType: "json"
                });
                byId("statusOutput").textContent = JSON.stringify(result, null, 2);
            });

            loadPage().catch(function (error) {
                const message = error && error.message ? error.message : String(error);
                byId("statusOutput").textContent = "Failed to load plugin configuration: " + message;
            });
        })();
    </script>
</div>
