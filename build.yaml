overview: "Sync Seerr and Jellyseerr requests into per-user KefinTweaks watchlists."
description: >
  Server-side Jellyfin plugin that syncs each user's Seerr or Jellyseerr requests
  into that same user's KefinTweaks watchlist using additive Jellyfin Likes
  updates. Includes optional per-user tag-based watchlist inclusion.
