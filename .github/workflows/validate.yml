name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build solution
        run: dotnet build WatchlistRequestsSync.sln -c Release

      - name: Test solution
        run: dotnet test WatchlistRequestsSync.sln -c Release --no-build
        env:
          DOTNET_ROLL_FORWARD: Major

      - name: Package plugin
        shell: pwsh
        run: ./scripts/Package-Plugin.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-requests-sync-package
          path: artifacts/package
